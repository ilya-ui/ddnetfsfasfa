name: DDNet Bot Army Headless (Final Fix)

on: 
  workflow_dispatch:

jobs:
  spawn-bots:
    strategy:
      fail-fast: false
      matrix:
        # Можешь увеличить количество машин до 10, чтобы было 40 ботов
        instance: [1, 2, 3, 4, 5] 
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Libs
        run: npm install teeworlds axios

      - name: Run Army
        env:
          CONTROL_URL: "https://me5years.alwaysdata.net/index.php?action=get"
          INSTANCE: ${{ matrix.instance }}
        run: |
          cat << 'EOF' > bot.js
          const { Client } = require('teeworlds');
          const axios = require('axios');

          const server = '88.198.96.203';
          const port = 8306;

          async function createBot(name, delay) {
            // Задержка перед созданием, чтобы сервер не забанил за частые входы
            await new Promise(r => setTimeout(r, delay));

            const client = new Client(server, port, name);
            let lastCmdId = 0;

            client.on('connected', () => {
              console.log(`[${name}] Подключен. Вхожу в игру...`);
              // Правильный метод в этой библиотеке - changeTeam
              setTimeout(() => {
                if (client.game) {
                  client.game.changeTeam(0); 
                  console.log(`[${name}] Заспавнился!`);
                }
              }, 3000);
            });

            client.on('disconnect', (reason) => {
              console.log(`[${name}] Вылетел: ${reason}`);
            });

            // Цикл опроса сайта
            setInterval(async () => {
              try {
                const res = await axios.get(process.env.CONTROL_URL);
                if (res.data && res.data.id > lastCmdId) {
                  lastCmdId = res.data.id;
                  const { type, value } = res.data;
                  console.log(`[${name}] Команда: ${type} -> ${value}`);

                  if (type === 'chat') {
                    client.game.say(value);
                  } else if (type === 'key') {
                    if (value === 'space') {
                      client.game.input.jump = 1;
                      setTimeout(() => { client.game.input.jump = 0; }, 300);
                    }
                    if (value === 'd') {
                      client.game.input.direction = 1;
                      setTimeout(() => { client.game.input.direction = 0; }, 1000);
                    }
                    if (value === 'a') {
                      client.game.input.direction = -1;
                      setTimeout(() => { client.game.input.direction = 0; }, 1000);
                    }
                  }
                }
              } catch (e) {}
            }, 1500);

            client.connect();
          }

          // Запускаем ровно 4 бота (лимит сервера на один IP)
          // С разным временем задержки, чтобы не кикало за спам подключениями
          createBot(`Bot_${process.env.INSTANCE}_1`, 1000);
          createBot(`Bot_${process.env.INSTANCE}_2`, 5000);
          createBot(`Bot_${process.env.INSTANCE}_3`, 10000);
          createBot(`Bot_${process.env.INSTANCE}_4`, 15000);
          EOF
          
          node bot.js
