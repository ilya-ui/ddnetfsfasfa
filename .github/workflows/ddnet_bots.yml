name: DDNet Bot Army Headless (Final Fix)

on: 
  workflow_dispatch:

jobs:
  spawn-bots:
    strategy:
      fail-fast: false
      matrix:
        instance: [1, 2, 3, 4, 5]
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Libs
        run: npm install teeworlds axios

      - name: Run Army
        env:
          CONTROL_URL: "https://me5years.alwaysdata.net/index.php?action=get"
          INSTANCE: ${{ matrix.instance }}
        run: |
          cat << 'EOF' > bot.js
          const { Client } = require('teeworlds');
          const axios = require('axios');

          const server = '88.198.96.203';
          const port = 8306;

          async function createBot(name) {
            const client = new Client(server, port, name);
            let lastCmdId = 0;
            let isInGame = false;

            client.on('connected', () => {
              console.log(`[${name}] Соединение установлено. Пытаюсь войти в игру...`);
              // Заходим в синюю/красную команду (0 - обычный вход)
              setTimeout(() => {
                client.game.joinTeam(0); 
                isInGame = true;
                console.log(`[${name}] Команда на вход отправлена!`);
              }, 2000);
            });

            client.on('disconnect', (reason) => {
              console.log(`[${name}] Вылетел: ${reason}`);
              isInGame = false;
            });

            setInterval(async () => {
              try {
                const res = await axios.get(process.env.CONTROL_URL);
                if (res.data && res.data.id > lastCmdId) {
                  lastCmdId = res.data.id;
                  const { type, value } = res.data;
                  
                  // Если бот еще не в игре, он может только копить команды, 
                  // но мы попробуем выполнить
                  console.log(`[${name}] Исполняю: ${type} -> ${value}`);

                  if (type === 'chat') {
                    client.game.say(value);
                  } else if (type === 'key') {
                    if (value === 'space') {
                      client.game.input.jump = 1;
                      setTimeout(() => { client.game.input.jump = 0; }, 300);
                    }
                    if (value === 'd') {
                      client.game.input.direction = 1;
                      setTimeout(() => { client.game.input.direction = 0; }, 1000);
                    }
                    if (value === 'a') {
                      client.game.input.direction = -1;
                      setTimeout(() => { client.game.input.direction = 0; }, 1000);
                    }
                  }
                }
              } catch (e) {}
            }, 1000);

            client.connect();
          }

          for (let i = 1; i <= 6; i++) {
            createBot(`Bot_${process.env.INSTANCE}_${i}`);
          }
          EOF
          
          node bot.js
