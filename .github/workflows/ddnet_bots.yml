name: DDNet Bot Army Headless (Fast)

on: 
  workflow_dispatch:

jobs:
  spawn-bots:
    strategy:
      fail-fast: false
      matrix:
        instance: [1, 2, 3, 4, 5] # 5 машин
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install teeworlds-bot-api axios

      - name: Start Bots
        env:
          CONTROL_URL: "https://me5years.alwaysdata.net/index.php?action=get"
          INSTANCE: ${{ matrix.instance }}
        run: |
          cat << 'EOF' > bot.js
          const { TeeworldsBot } = require('teeworlds-bot-api');
          const axios = require('axios');

          const server = '167.99.136.66';
          const port = 8303;

          async function createBot(name) {
              const bot = new TeeworldsBot(server, port, name);
              
              let lastId = 0;

              // Каждые 1.5 секунды проверяем сайт на наличие команд
              setInterval(async () => {
                  try {
                      const res = await axios.get(process.env.CONTROL_URL);
                      const data = res.data;

                      if (data && data.id > lastId) {
                          lastId = data.id;
                          console.log(`[${name}] Команда: ${data.type} - ${data.value}`);

                          if (data.type === 'chat') {
                              bot.say(data.value);
                          } else if (data.type === 'key') {
                              if (data.value === 'space') bot.jump();
                              if (data.value === 'd') { bot.moveRight(); setTimeout(() => bot.stopMoving(), 500); }
                              if (data.value === 'a') { bot.moveLeft(); setTimeout(() => bot.stopMoving(), 500); }
                          }
                      }
                  } catch (e) {}
              }, 1500);

              bot.connect();
          }

          // Запускаем 6 ботов на одну машину (всего будет 30 ботов)
          for(let i=1; i<=6; i++) {
              createBot(`Bot_${process.env.INSTANCE}_${i}`);
          }
          EOF
          
          node bot.js
