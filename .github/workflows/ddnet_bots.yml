name: DDNet Bot Army Headless (Fixed)

on: 
  workflow_dispatch:

jobs:
  spawn-bots:
    strategy:
      fail-fast: false
      matrix:
        instance: [1, 2, 3, 4, 5]
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18 # Используем стабильную 18-ю версию

      - name: Install Dependencies
        # Пакет называется teeworlds, а не teeworlds-bot-api
        run: npm install teeworlds axios

      - name: Run Bots Script
        env:
          CONTROL_URL: "https://me5years.alwaysdata.net/index.php?action=get"
          INSTANCE: ${{ matrix.instance }}
        run: |
          cat << 'EOF' > bot.js
          const { Client } = require('teeworlds');
          const axios = require('axios');

          const server = '167.99.136.66';
          const port = 8303;

          async function createBot(name) {
              const client = new Client(server, port, name);
              
              let lastId = 0;

              client.on('connected', () => {
                  console.log(`[${name}] Подключен к серверу!`);
              });

              client.on('disconnect', (reason) => {
                  console.log(`[${name}] Отключен: ${reason}`);
              });

              // Цикл опроса сайта на наличие команд
              setInterval(async () => {
                  try {
                      const res = await axios.get(process.env.CONTROL_URL);
                      const data = res.data;

                      if (data && data.id > lastId) {
                          lastId = data.id;
                          console.log(`[${name}] Новая команда: ${data.type}`);

                          if (data.type === 'chat') {
                              client.game.say(data.value);
                          } else if (data.type === 'key') {
                              // Управление в библиотеке teeworlds
                              if (data.value === 'space') {
                                  client.game.input.jump = 1;
                                  setTimeout(() => client.game.input.jump = 0, 200);
                              }
                              if (data.value === 'd') {
                                  client.game.input.direction = 1;
                                  setTimeout(() => client.game.input.direction = 0, 1000);
                              }
                              if (data.value === 'a') {
                                  client.game.input.direction = -1;
                                  setTimeout(() => client.game.input.direction = 0, 1000);
                              }
                          }
                      }
                  } catch (e) {
                      // Игнорируем ошибки сети
                  }
              }, 1500);

              client.connect();
          }

          // Запускаем по 6 ботов на машину
          for(let i=1; i<=6; i++) {
              createBot(`Bot_${process.env.INSTANCE}_${i}`);
          }
          EOF
          
          node bot.js
