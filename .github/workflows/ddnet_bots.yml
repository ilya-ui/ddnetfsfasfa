name: DDNet Bot Army Headless

on: 
  workflow_dispatch:

jobs:
  spawn-bots:
    strategy:
      fail-fast: false
      matrix:
        instance: [1, 2, 3, 4, 5] # 5 машин
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Libs
        run: npm install teeworlds axios

      - name: Run Army
        env:
          CONTROL_URL: "https://me5years.alwaysdata.net/index.php?action=get"
          INSTANCE: ${{ matrix.instance }}
        run: |
          cat << 'EOF' > bot.js
          const { Client } = require('teeworlds');
          const axios = require('axios');

          const server = '130.61.121.181';
          const port = 8303;

          async function createBot(name) {
            const client = new Client(server, port, name);
            let lastCmdId = 0;

            client.on('connected', () => {
              console.log(`[${name}] В игре!`);
            });

            // Опрос сайта на команды
            setInterval(async () => {
              try {
                const res = await axios.get(process.env.CONTROL_URL);
                if (res.data && res.data.id > lastCmdId) {
                  lastCmdId = res.data.id;
                  const { type, value } = res.data;
                  console.log(`[${name}] Команда: ${type} -> ${value}`);

                  if (type === 'chat') {
                    client.game.say(value);
                  } else if (type === 'key') {
                    if (value === 'space') {
                      client.game.input.jump = 1;
                      setTimeout(() => { client.game.input.jump = 0; }, 200);
                    }
                    if (value === 'd') {
                      client.game.input.direction = 1;
                      setTimeout(() => { client.game.input.direction = 0; }, 1000);
                    }
                    if (value === 'a') {
                      client.game.input.direction = -1;
                      setTimeout(() => { client.game.input.direction = 0; }, 1000);
                    }
                  }
                }
              } catch (e) {}
            }, 1000); // Проверка каждую секунду

            client.connect();
          }

          // Запускаем по 6 ботов на машину
          for (let i = 1; i <= 6; i++) {
            createBot(`Bot_${process.env.INSTANCE}_${i}`);
          }
          EOF
          
          node bot.js
